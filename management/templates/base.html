{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Ship Management{% endblock %}</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f6f9;
            position: relative;
        }

        /* WATERMARK */
        body::before {
            content: "";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            background: url("{% static 'image/navy.svg' %}") no-repeat center;
            background-size: contain;
            opacity: 0.50;
            z-index: -1;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0b3d5c;
            color: white;
            padding: 15px 40px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img {
            width: 35px;
        }

        .nav-links a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }

        .logout-btn {
            background: red;
            color: white;
            padding: 6px 12px;
            border-radius: 5px;
            text-decoration: none;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">
        <img src="{% static 'image/navy.svg' %}">
        <h2>Naval Fleet</h2>
    </div>

    <div class="nav-links">
        <a href="{% url 'landing_home' %}">Home</a>
        <a href="{% url 'ships' %}">Ships</a>
        <a href="{% url 'about' %}">About</a>
    </div>

    <div>
        <span>{{ request.user.username }}</span>
        <a href="{% url 'logout' %}" class="logout-btn">Logout</a>
    </div>
</div>

<!-- PAGE CONTENT -->
{% block content %}{% endblock %}

</body>
</html>
