{% extends 'base.html' %}
{% load static %}

{% block title %}Home{% endblock %}

{% block content %}

<div style="text-align:center; margin-top:30px;">
    <h1>⚓INTRODUCTION </h1>
</div>

<div style="width:80%; margin:auto; margin-top:30px;">

    {% for item in home_data %}
        <div style="background:white; padding:20px; margin-bottom:20px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1);">

            <h2>{{ item.title }}</h2>

           

            <div class="content-box">
    {{ item.description|linebreaks }}
</div>

 {% if item.image %}
                <img src="{{ item.image.url }}" style="width:100%; max-height:300px; object-fit:cover; border-radius:8px;">
            {% endif %}

        </div>
    {% empty %}
        <p>No content added by admin.</p>
    {% endfor %}

</div>

{% endblock %}
