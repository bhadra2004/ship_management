services:
  - type: web
    name: ship-management
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn ship_management.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ship_db
          property: connectionString
      - key: DISABLE_COLLECTSTATIC
        value: "1"

databases:
  - name: ship_db
    plan: free
    postgresMajorVersion: "15"